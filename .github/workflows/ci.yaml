name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual trigger for platform builds

permissions:
  contents: write # lets CI push logs to the ci-logs branch

jobs:
  # Cheap fast loop: every push (Linux runner, 1x minutes)
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cp .env.example .env
      - name: Run checks (captured)
        run: |
          set -o pipefail
          status=0
          run() { echo "===== \$ $*" | tee -a ci.log; "$@" 2>&1 | tee -a ci.log || status=1; }
          run flutter --version
          run flutter pub get
          run dart run build_runner build --delete-conflicting-outputs
          run flutter analyze
          run flutter test
          echo "===== EXIT STATUS: $status" | tee -a ci.log
          echo "CI_STATUS=$status" >> "$GITHUB_ENV"
          exit $status
      # Publish the log to a git branch so it is readable via plain `git fetch`
      # (sandbox has github.com git access but no Actions API access).
      - name: Publish log to ci-logs branch
        if: always()
        run: |
          mkdir -p /tmp/cilogs
          cp ci.log /tmp/cilogs/quality.log || echo "no log" > /tmp/cilogs/quality.log
          echo "run=${GITHUB_RUN_NUMBER} sha=${GITHUB_SHA} status=${CI_STATUS:-unknown}" > /tmp/cilogs/STATUS
          cd /tmp/cilogs
          git init -q -b ci-logs
          git config user.name ci && git config user.email ci@local
          git add -A && git commit -qm "quality run ${GITHUB_RUN_NUMBER} (${GITHUB_SHA})"
          git push -qf "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git" ci-logs

  # Installables published to dist-* branches (fetchable via plain git).
  build-macos:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cp .env.example .env
      - run: flutter create --platforms=macos --project-name rada .
      - name: Entitlements — network client + microphone
        run: |
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.device.audio-input bool true" "$f" 2>/dev/null || true
          done
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Estonian speech practice recording'" macos/Runner/Info.plist 2>/dev/null || true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release
      - name: Create DMG
        run: |
          mkdir -p dmgroot && cp -R build/macos/Build/Products/Release/rada.app dmgroot/
          hdiutil create -volname Rada -srcfolder dmgroot -ov -format UDZO Rada.dmg
          ls -lh Rada.dmg
      - name: Publish to dist-macos branch
        run: |
          mkdir -p /tmp/dist && cp Rada.dmg /tmp/dist/
          echo "run=${GITHUB_RUN_NUMBER} sha=${GITHUB_SHA}" > /tmp/dist/STATUS
          cd /tmp/dist && git init -q -b dist-macos
          git config user.name ci && git config user.email ci@local
          git add -A && git commit -qm "Rada.dmg run ${GITHUB_RUN_NUMBER}"
          git push -qf "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git" dist-macos

  build-android:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cp .env.example .env
      - run: flutter create --platforms=android --project-name rada .
      - name: Android manifest — INTERNET + RECORD_AUDIO permissions
        run: |
          sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application#' android/app/src/main/AndroidManifest.xml
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch flutter_inappwebview proguard ref (AGP compat)
        run: |
          for f in $(find ~/.pub-cache -path "*flutter_inappwebview_android*" -name "build.gradle"); do
            sed -i "s/proguard-android\.txt/proguard-android-optimize.txt/g" "$f" && echo "patched $f"
          done
      - name: Build APK (captured)
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee android-build.log
      - name: Publish build log
        if: always()
        run: |
          mkdir -p /tmp/blog && cp android-build.log /tmp/blog/android.log 2>/dev/null || echo "no log" > /tmp/blog/android.log
          echo "run=${GITHUB_RUN_NUMBER} sha=${GITHUB_SHA} outcome=${{ job.status }}" > /tmp/blog/STATUS
          cd /tmp/blog && git init -q -b ci-logs-android
          git config user.name ci && git config user.email ci@local
          git add -A && git commit -qm "android build log run ${GITHUB_RUN_NUMBER}"
          git push -qf "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git" ci-logs-android
      - name: Publish to dist-android branch
        run: |
          mkdir -p /tmp/dist && cp build/app/outputs/flutter-apk/app-release.apk /tmp/dist/rada.apk
          echo "run=${GITHUB_RUN_NUMBER} sha=${GITHUB_SHA}" > /tmp/dist/STATUS
          cd /tmp/dist && git init -q -b dist-android
          git config user.name ci && git config user.email ci@local
          git add -A && git commit -qm "rada.apk run ${GITHUB_RUN_NUMBER}"
          git push -qf "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git" dist-android
